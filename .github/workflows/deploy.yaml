name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin 096429911623.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image (AMD64 FIX)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t road-guardian .

      - name: Tag image
        run: |
          docker tag road-guardian:latest \
          096429911623.dkr.ecr.us-east-1.amazonaws.com/road-guardian:latest

      - name: Push image
        run: |
          docker push 096429911623.dkr.ecr.us-east-1.amazonaws.com/road-guardian:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.CLUSTER_NAME }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/